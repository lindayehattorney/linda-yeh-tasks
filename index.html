<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>葉家瑄律師事務所 - 案件管理系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Cormorant+Garamond:wght@400;600&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#C9A84C;--gold-l:#E8C97A;--gold-d:#8B6914;
  --navy:#0D1B2A;--navy-l:#1A2D42;
  --surf:#1E2D3D;--surf-h:#253545;
  --bd:rgba(201,168,76,0.2);--bd-b:rgba(201,168,76,0.45);
  --t1:#F0E6CC;--t2:#A89870;--tm:#6B7A8D;
  --r:8px;--rl:12px;
}
body{font-family:'PingFang TC','Microsoft JhengHei',sans-serif;background:var(--navy);color:var(--t1);height:100vh;overflow:hidden;font-size:14px;}

/* Login */
#loginScreen{position:fixed;inset:0;background:var(--navy);z-index:300;display:flex;align-items:center;justify-content:center;}
.lcard{background:var(--navy-l);border:1px solid var(--bd-b);border-radius:16px;padding:48px;width:360px;display:flex;flex-direction:column;gap:20px;align-items:center;}
.licon{width:68px;height:68px;background:rgba(201,168,76,0.12);border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;}
.ltitle{font-size:19px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.fg{display:flex;flex-direction:column;gap:5px;width:100%;}
.flabel{font-size:12px;color:var(--t2);font-weight:500;}
.finput,.fselect{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);padding:8px 12px;font-size:13px;color:var(--t1);font-family:inherit;outline:none;width:100%;}
.finput:focus,.fselect:focus{border-color:var(--gold);}
.fselect option{background:var(--navy-l);}

/* App */
#app{flex-direction:column;height:100vh;} #app[style*="flex"]{display:flex !important;}
.header{background:linear-gradient(135deg,#0D1B2A,#1A2D42);border-bottom:1px solid var(--bd-b);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:68px;flex-shrink:0;position:relative;}
.logo{display:flex;align-items:center;gap:14px;}
.logo-img{width:48px;height:48px;border-radius:50%;object-fit:cover;border:1.5px solid var(--bd-b);background:#fff;}
.logo-texts{}
.logo-sub{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-weight:500;}
.logo-name{font-size:16px;font-weight:700;color:var(--t1);letter-spacing:.5px;line-height:1.2;}
.logo-en{font-size:11px;color:var(--t2);letter-spacing:.5px;margin-top:1px;}
.header-center{position:absolute;left:50%;transform:translateX(-50%);text-align:center;}
.header-title{font-size:18px;font-weight:700;color:var(--t1);letter-spacing:2px;}
.header-title-en{font-size:11px;color:var(--t2);letter-spacing:2px;margin-top:2px;}
.layout{display:flex;flex:1;overflow:hidden;}

/* Sidebar */
/* Top nav bar */
.topnav{background:var(--navy-l);border-bottom:1px solid var(--bd);padding:0 16px;display:flex;align-items:center;gap:6px;height:48px;flex-shrink:0;overflow-x:auto;}
.topnav::-webkit-scrollbar{height:0;}
.tn-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:var(--r);cursor:pointer;font-size:13px;white-space:nowrap;transition:all .15s;border:none;font-family:inherit;background:transparent;color:var(--t2);}
.tn-btn:hover{background:rgba(201,168,76,0.08);color:var(--t1);}
.tn-btn.active{background:rgba(201,168,76,0.14);color:var(--gold);}
.tn-add{background:var(--gold);color:var(--navy);font-weight:700;}
.tn-add:hover{background:var(--gold-l);}
.tn-divider{width:1px;height:24px;background:var(--bd);flex-shrink:0;margin:0 4px;}
.tn-member{position:relative;border:1px solid transparent;}
.tn-member:hover{border-color:var(--bd-b);}
.tn-member.active{background:rgba(201,168,76,0.14);color:var(--gold);border-color:var(--bd-b);}
.tn-member.dragging{opacity:0.4;}
.tn-member.drag-over{border-left:2px solid var(--gold);}
.m-avatar{width:22px;height:22px;border-radius:50%;background:var(--gold-d);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--gold-l);flex-shrink:0;}
.m-count{font-size:10px;color:var(--tm);background:var(--surf);padding:1px 6px;border-radius:8px;}
.m-edit{opacity:0.5;font-size:12px;color:var(--tm);cursor:pointer;background:none;border:none;padding:1px 3px;line-height:1;}
.tn-member:hover .m-edit{opacity:1;color:var(--gold);}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.toolbar{padding:12px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--navy-l);flex-shrink:0;}
.page-title{font-size:17px;font-weight:700;color:var(--gold);}
.search-box{display:flex;align-items:center;gap:7px;background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);padding:5px 11px;width:200px;}
.search-box input{background:none;border:none;outline:none;color:var(--t1);font-size:13px;width:100%;}

/* Stats */
.stats-row{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;}
.stat-box{flex:1;padding:10px 18px;border-right:1px solid var(--bd);}
.stat-box:last-child{border-right:none;}
.stat-num{font-size:20px;font-weight:700;color:var(--gold);}
.stat-lbl{font-size:10px;color:var(--tm);margin-top:1px;}

/* Table */
.table-wrap{flex:1;overflow:auto;}
table{width:100%;border-collapse:collapse;}
thead th{position:sticky;top:0;background:var(--surf);padding:9px 12px;text-align:left;font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.8px;font-weight:500;border-bottom:1px solid var(--bd);white-space:nowrap;user-select:none;}
tbody tr{border-bottom:1px solid rgba(201,168,76,0.07);}
tbody tr:hover{background:rgba(201,168,76,0.04);}
tbody td{padding:0;vertical-align:middle;font-size:13px;position:relative;}
.cw{padding:8px 12px;min-height:38px;display:flex;align-items:center;}
.ct{color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.cm{color:var(--tm);}
td.ed .cw{cursor:pointer;}
td.ed:hover .cw{background:rgba(201,168,76,0.07);border-radius:4px;}

/* Inline inputs */
.ii{width:100%;background:var(--surf-h);border:1.5px solid var(--gold);border-radius:4px;padding:6px 8px;font-size:13px;color:var(--t1);font-family:inherit;outline:none;display:block;}
.ita{width:100%;background:var(--surf-h);border:1.5px solid var(--gold);border-radius:4px;padding:6px 8px;font-size:13px;color:var(--t1);font-family:inherit;outline:none;display:block;resize:none;min-height:64px;line-height:1.5;}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;}
.bu{background:rgba(226,75,74,0.15);color:#FF7B7A;border:1px solid rgba(226,75,74,0.3);}
.bp{background:rgba(239,159,39,0.15);color:#F5B84A;border:1px solid rgba(239,159,39,0.3);}
.bd2{background:rgba(29,158,117,0.15);color:#2ECFA0;border:1px solid rgba(29,158,117,0.3);}
.dl-u{color:#FF7B7A;}
.dl-s{color:#F5B84A;}
.dl-o{color:#2ECFA0;}

/* Person chip */
.pchip{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;background:rgba(55,138,221,0.1);border:1px solid rgba(55,138,221,0.22);border-radius:20px;font-size:11px;color:#7DC3F7;white-space:nowrap;}

/* Buttons */
.btn{padding:6px 13px;border-radius:var(--r);font-size:13px;cursor:pointer;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:all .15s;}
.bp2{background:var(--gold);color:var(--navy);font-weight:700;}
.bp2:hover{background:var(--gold-l);}
.bg{background:transparent;border:1px solid var(--bd-b);color:var(--t2);}
.bg:hover{background:rgba(201,168,76,0.08);color:var(--t1);}
.bda{background:rgba(226,75,74,0.12);border:1px solid rgba(226,75,74,0.3);color:#FF7B7A;}
.bda:hover{background:rgba(226,75,74,0.22);}
.bico{width:28px;height:28px;padding:0;display:inline-flex;align-items:center;justify-content:center;}
.del-btn{opacity:0;background:none;border:none;color:#FF7B7A;cursor:pointer;padding:4px;border-radius:4px;font-size:14px;display:flex;align-items:center;}
tbody tr:hover .del-btn{opacity:1;}

/* Status popup */
.status-popup{position:fixed;background:var(--navy-l);border:1px solid var(--bd-b);border-radius:var(--rl);padding:6px;min-width:140px;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.sp-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--t2);transition:all .15s;}
.sp-item:hover{background:rgba(201,168,76,0.08);color:var(--t1);}
.sp-item.selected{color:var(--gold);}

/* Custom Calendar */
.cal-popup{position:fixed;background:var(--navy-l);border:1px solid var(--bd-b);border-radius:var(--rl);padding:16px;z-index:500;box-shadow:0 8px 32px rgba(0,0,0,0.5);width:300px;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-title{font-size:15px;font-weight:600;color:var(--gold);}
.cal-nav{background:none;border:none;color:var(--t2);cursor:pointer;padding:4px 8px;border-radius:var(--r);font-size:16px;transition:all .15s;}
.cal-nav:hover{background:rgba(201,168,76,0.1);color:var(--gold);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{text-align:center;font-size:10px;color:var(--tm);padding:4px 0;font-weight:500;}
.cal-day{text-align:center;padding:7px 4px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--t2);transition:all .15s;line-height:1;}
.cal-day:hover{background:rgba(201,168,76,0.12);color:var(--t1);}
.cal-day.today{color:var(--gold);font-weight:600;}
.cal-day.selected{background:var(--gold);color:var(--navy);font-weight:700;}
.cal-day.other-month{color:var(--tm);opacity:.4;}
.cal-day.empty{cursor:default;}
.cal-day.empty:hover{background:none;}
.cal-footer{margin-top:12px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--bd);padding-top:12px;}
.cal-clear{font-size:12px;color:var(--tm);cursor:pointer;background:none;border:none;font-family:inherit;}
.cal-clear:hover{color:#FF7B7A;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:none;align-items:center;justify-content:center;z-index:400;}
.overlay.show{display:flex;}
.modal{background:var(--navy-l);border:1px solid var(--bd-b);border-radius:var(--rl);width:340px;max-width:92vw;}
.mhead{padding:18px 22px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.mtitle{font-size:15px;font-weight:700;color:var(--gold);}
.mclose{background:none;border:none;color:var(--tm);cursor:pointer;font-size:22px;line-height:1;}
.mbody{padding:18px 22px;display:flex;flex-direction:column;gap:12px;}
.mfoot{padding:12px 22px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px;}


::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--bd-b);border-radius:3px;}

/* ── Responsive Design ── */

/* Tablet (768px and below) */
@media (max-width: 768px) {
  .header { padding: 0 16px; height: 60px; }
  .header-center { display: none; }
  .logo-name { font-size: 14px; letter-spacing: 1px; }
  .logo-en { display: none; }
  .logo-img { width: 40px; height: 40px; }

  .topnav { padding: 0 10px; gap: 4px; height: 44px; overflow-x: auto; }
  .tn-btn { padding: 5px 10px; font-size: 12px; }
  .tn-add { padding: 5px 12px; }

  .toolbar { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
  .page-title { font-size: 15px; }
  .search-box { width: 160px; }

  .stats-row { overflow-x: auto; }
  .stat-box { min-width: 80px; padding: 8px 12px; }
  .stat-num { font-size: 18px; }

  /* Hide less important columns on tablet */
  table col.col-courtdiv,
  thead th:nth-child(7),
  tbody td:nth-child(7) { display: none; }
}

/* Mobile (480px and below) */
@media (max-width: 480px) {
  /* ── 基本頁面可滑動 ── */
  body { overflow: auto !important; height: auto !important; }
  #app { height: auto !important; min-height: 100vh; overflow: visible !important; }
  .layout { overflow: visible !important; height: auto !important; }
  .main { overflow: visible !important; height: auto !important; }
  .table-wrap { overflow: visible !important; height: auto !important; }

  /* ── Header ── */
  .header { height: 56px; padding: 0 12px; }
  .logo-img { width: 36px; height: 36px; }
  .logo-name { font-size: 13px; letter-spacing: 0.5px; }

  /* ── Top nav 縮成一行 ── */
  .topnav { height: auto; padding: 6px 8px; gap: 4px; flex-wrap: wrap; }
  .tn-btn { font-size: 11px; padding: 4px 8px; }
  .tn-add { font-size: 12px; }
  .m-count { display: none; }
  .tn-divider { display: none; }

  /* ── Stats 縮成一行 ── */
  .stats-row { flex-wrap: nowrap; overflow-x: auto; }
  .stat-box { flex: 0 0 auto; min-width: 70px; padding: 8px 10px; border-right: 1px solid var(--bd) !important; border-bottom: none !important; }
  .stat-num { font-size: 16px; }
  .stat-lbl { font-size: 9px; }

  /* ── Toolbar ── */
  .toolbar { padding: 8px 12px; flex-wrap: wrap; gap: 8px; }
  .page-title { font-size: 14px; }
  .search-box { width: 100%; }

  /* ── Card layout ── */
  table, thead, tbody, tr, td, th { display: block !important; }
  thead { display: none !important; }

  tbody tr {
    background: var(--navy-l);
    border: 1px solid var(--bd);
    border-radius: var(--rl);
    margin: 8px 10px;
    padding: 12px;
    display: flex !important;
    flex-direction: column;
    gap: 8px;
  }
  tbody tr:hover { background: var(--surf-h); }

  tbody td {
    padding: 0 !important;
    border: none !important;
    width: 100% !important;
    font-size: 13px;
  }

  .cw { padding: 0 !important; min-height: auto !important; }

  /* 案件名稱大一點 */
  tbody td:nth-child(1) .cw { font-size: 15px; font-weight: 600; }

  /* 每個欄位加標籤 */
  tbody td:nth-child(3)::before { content: "法院／檢察署"; font-size: 10px; color: var(--tm); display: block; margin-bottom: 2px; }
  tbody td:nth-child(4)::before { content: "負責人"; font-size: 10px; color: var(--tm); display: block; margin-bottom: 2px; }
  tbody td:nth-child(5)::before { content: "開庭日"; font-size: 10px; color: var(--tm); display: block; margin-bottom: 2px; }
  tbody td:nth-child(6)::before { content: "工作截止日"; font-size: 10px; color: var(--tm); display: block; margin-bottom: 2px; }
  tbody td:nth-child(7)::before { content: "進行概述"; font-size: 10px; color: var(--tm); display: block; margin-bottom: 2px; }
  tbody td:nth-child(8)::before { content: "案號"; font-size: 10px; color: var(--tm); display: block; margin-bottom: 2px; }
  tbody td:nth-child(9)::before { content: "股別"; font-size: 10px; color: var(--tm); display: block; margin-bottom: 2px; }
  tbody td:nth-child(10)::before { content: "電話"; font-size: 10px; color: var(--tm); display: block; margin-bottom: 2px; }
  tbody td:nth-child(11)::before { content: "分機"; font-size: 10px; color: var(--tm); display: block; margin-bottom: 2px; }

  /* 顯示所有欄位 */
  tbody td:nth-child(9),
  tbody td:nth-child(10),
  tbody td:nth-child(11) { display: block !important; }

  /* 刪除按鈕 */
  tbody td:nth-child(12) { display: flex !important; justify-content: flex-end; }
  .del-btn { opacity: 1 !important; }

  /* ── Modal ── */
  .modal { width: 95vw !important; max-height: 85vh; overflow-y: auto; }
  .mbody { padding: 14px 16px; gap: 10px; }
  .form-row { grid-template-columns: 1fr !important; }

  /* ── Calendar ── */
  .cal-popup { width: calc(100vw - 24px) !important; left: 12px !important; right: 12px; }

  /* ── Status & Person popups ── */
  .status-popup { position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important; top: auto !important; width: 100% !important; border-radius: 16px 16px 0 0; padding: 12px; }
  #personPopup { position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important; top: auto !important; width: 100% !important; border-radius: 16px 16px 0 0; padding: 12px; max-height: 60vh; overflow-y: auto; }

  /* 登入頁 */
  #loginScreen { padding: 20px; }
  .lcard { width: 100%; padding: 32px 20px; }
  .ltitle { font-size: 18px; }
}


@media (max-width: 480px) {
  #loginScreen { padding: 20px; }
  .lcard { width: 100%; padding: 32px 24px; }
  .ltitle { font-size: 18px; }
}

</style>
</head>

// ── Load all data from Supabase ──
function loadData(){
  return Promise.all([
    _SB.from('members').select('*').order('sort_order'),
    _SB.from('cases').select('*').order('created_at', {ascending: false})
  ]).then(function(results){
    var mr = results[0], cr = results[1];
    if(mr.error){ console.error('Load members error:', mr.error); return; }
    if(cr.error){ console.error('Load cases error:', cr.error); return; }
    members = mr.data || [];
    cases = (cr.data || []).map(function(row){
      return {
        id: row.id,
        name: row.name || '',
        status: row.status || 'urgent',
        court: row.court || '',
        deadline: row.deadline || '',
        courthouse: row.courthouse || '',
        caseNum: row.casenum || '',
        courtStock: row.courtstock || '',
        phone: row.phone || '',
        ext: row.ext || '',
        desc: row.description || '',
        personIds: row.personids || [],
        created_at: row.created_at
      };
    });
    renderSidebar();
    renderCases();
  });
}

// ── Save member to Supabase ──
function dbSaveMember(m, callback){
  var isNew = !m.id || m.id.startsWith('tmp_');
  if(isNew){
    _SB.from('members').insert({
      name: m.name,
      sort_order: m.sort_order || 0
    }).select().single().then(function(r){
      if(r.error){ console.error('Insert member error:', r.error); alert('儲存失敗：' + r.error.message); return; }
      m.id = r.data.id;
      if(callback) callback();
      loadData();
    });
  } else {
    _SB.from('members').update({
      name: m.name,
      sort_order: m.sort_order || 0
    }).eq('id', m.id).then(function(r){
      if(r.error){ console.error('Update member error:', r.error); alert('更新失敗：' + r.error.message); return; }
      if(callback) callback();
      loadData();
    });
  }
}

// ── Delete member from Supabase ──
function dbDeleteMember(id, callback){
  if(!id){ console.error('No id provided to dbDeleteMember'); return; }
  _SB.from('members').delete().eq('id', id).then(function(r){
    if(r.error){ console.error('Delete member error:', r.error); alert('刪除失敗：'+r.error.message); return; }
    if(callback) callback();
    loadData();
  });
}

// ── Save case to Supabase ──
function dbSaveCase(caseObj, callback){
  var row = {
    name: caseObj.name || '',
    status: caseObj.status || 'urgent',
    court: caseObj.court || null,
    deadline: caseObj.deadline || null,
    courthouse: caseObj.courthouse || '',
    casenum: caseObj.caseNum || '',
    courtstock: caseObj.courtStock || '',
    phone: caseObj.phone || '',
    ext: caseObj.ext || '',
    description: caseObj.desc || '',
    personids: caseObj.personIds || []
  };
  var isNew = !caseObj.id || caseObj.id.startsWith('tmp_');
  if(isNew){
    _SB.from('cases').insert(row).select().single().then(function(r){
      if(r.error){ console.error('Insert case error:', r.error); alert('儲存失敗：' + r.error.message); return; }
      caseObj.id = r.data.id;
      if(callback) callback();
      loadData();
    });
  } else {
    _SB.from('cases').update(row).eq('id', caseObj.id).then(function(r){
      if(r.error){ console.error('Update case error:', r.error); alert('更新失敗：' + r.error.message); return; }
      if(callback) callback();
      loadData();
    });
  }
}

// ── Delete case from Supabase ──
function dbDeleteCase(id, callback){

function calPrevMonth(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNextMonth(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}
function renderCalendar(){
  const months=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('calTitle').textContent=calYear+'年 '+months[calMonth];
  const grid=document.getElementById('calGrid');
  const dows=['日','一','二','三','四','五','六'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const first=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const today=new Date(); today.setHours(0,0,0,0);
  let selected='';
  if(calTarget){
    if(calTarget.modal){
      const fieldId=calTarget.field==='court'?'cCourt':'cDeadline';
      selected=document.getElementById(fieldId)?document.getElementById(fieldId).value||'':'';
    } else {
      const c=cases.find(x=>x.id===calTarget.caseId);if(c)selected=c[calTarget.field]||'';
    }
  }
  // prev month padding
  for(let i=first-1;i>=0;i--){
    html+=`<div class="cal-day other-month">${daysInPrev-i}</div>`;
  }
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(calYear,calMonth,d);
    const dtStr=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=dt.getTime()===today.getTime();
    const isSel=selected===dtStr;
    html+=`<div class="cal-day${isToday?' today':''}${isSel?' selected':''}" onclick="pickDate('${dtStr}')">${d}</div>`;
  }
  // fill remaining
  const total=first+daysInMonth;
  const rem=(7-total%7)%7;
  for(let d=1;d<=rem;d++) html+=`<div class="cal-day other-month">${d}</div>`;
  grid.innerHTML=html;
}
function pickDate(dtStr){
  if(!calTarget) return;
  if(calTarget.modal){
    const fieldId=calTarget.field==='court'?'cCourt':'cDeadline';
    const labelId=calTarget.field==='court'?'cCourtLabel':'cDeadlineLabel';
    document.getElementById(fieldId).value=dtStr;
    const p=dtStr.split('-');
    document.getElementById(labelId).textContent=p[0]+'/'+p[1]+'/'+p[2];
    document.getElementById(labelId).style.color='var(--t1)';
    closeCalendar(); return;
  }
  var caseObj=cases.find(function(x){return x.id===calTarget.caseId;});
  if(caseObj){
    caseObj[calTarget.field]=dtStr;
    renderCases();
    dbSaveCase(caseObj);
  }
  closeCalendar();
}

// ── Inline text editing ──
function commitActiveCell(){
  if(!activeCell) return;
  var caseId=activeCell.caseId, field=activeCell.field, input=activeCell.input;
  var caseObj=cases.find(function(x){return x.id===caseId;});
  if(caseObj){
    caseObj[field]=input.value;
    dbSaveCase(caseObj);
  }
  activeCell=null;
  renderCases();
}
function activateTextCell(td,caseId,field){
  if(activeCell&&activeCell.td===td) return;
  commitActiveCell();
  const caseObj=cases.find(x=>x.id===caseId);
  if(!caseObj) return;
  td.innerHTML='';
  let input;
  const textareaFields=['desc','name','courthouse','caseNum','courtStock'];
  if(textareaFields.includes(field)){
    input=document.createElement('textarea');
    input.className='ita';
    input.style.minHeight='36px';
  } else {
    input=document.createElement('input');
    input.type='text';
    input.className='ii';
  }
  input.value=caseObj[field]||'';
  input.addEventListener('keydown',function(e){
    if(e.key==='Escape'){commitActiveCell();renderCases();}
  });
  input.addEventListener('blur',function(){
    setTimeout(function(){
      if(activeCell&&activeCell.input===input){
        commitActiveCell();
        renderCases();
      }
    },200);
  });
  activeCell={td,caseId,field,input};
  td.appendChild(input);
  setTimeout(function(){input.focus();},10);
}

// ── Render ──
function badge(s){
  if(s==='urgent') return '<span class="badge bu">優先處理</span>';
  if(s==='progress') return '<span class="badge bp">處理中</span>';
  if(s==='done') return '<span class="badge bd2">已完成</span>';
  return '';
}
function fmtDate(d){
  if(!d) return '';
  const p=d.split('-');
  return p[0]+'/'+p[1]+'/'+p[2];
}
function dlCls(d){
  if(!d) return 'dl-o';
  const diff=(new Date(d)-new Date())/(86400000);
  return diff<0?'dl-u':diff<=7?'dl-s':'dl-o';
}
function getMemberName(id){
  if(!id) return '';
  const m=members.find(x=>x.id===id);
  return m?m.name:'';
}

function renderCases(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  let data=currentMemberId?cases.filter(c=>(c.personIds||[]).includes(currentMemberId)):cases.slice();
  if(q) data=data.filter(c=>
    (c.name||'').toLowerCase().includes(q)||
    (c.desc||'').toLowerCase().includes(q)||
    (c.caseNum||'').toLowerCase().includes(q)||
    (c.personIds||[]).some(id=>getMemberName(id).toLowerCase().includes(q))
  );
  const urgent=data.filter(c=>c.status==='urgent').length;
  const prog=data.filter(c=>c.status==='progress').length;
  const done=data.filter(c=>c.status==='done').length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-box"><div class="stat-num">${data.length}</div><div class="stat-lbl">全部案件</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#FF7B7A">${urgent}</div><div class="stat-lbl">優先處理</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#F5B84A">${prog}</div><div class="stat-lbl">處理中</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#2ECFA0">${done}</div><div class="stat-lbl">已完成</div></div>
  `;
  const body=document.getElementById('caseBody');
  if(!data.length){
    body.innerHTML=`<tr><td colspan="12" style="text-align:center;padding:44px;color:var(--tm);color:var(--tm)" colspan="12">${q?'沒有符合的案件':'點擊「新增案件」開始'}</td></tr>`;
    return;
  }
  const mname=getMemberName.bind(null);
  // Sort: status priority, then deadline, then court
  const statusOrder={urgent:0,progress:1,done:2};
  data.sort((a,b)=>{
    const sd=(statusOrder[a.status]??1)-(statusOrder[b.status]??1);
    if(sd!==0) return sd;
    const ad=a.deadline||'9999', bd=b.deadline||'9999';
    if(ad!==bd) return ad<bd?-1:1;
    const ac=a.court||'9999', bc=b.court||'9999';
    return ac<bc?-1:ac>bc?1:0;
  });
  body.innerHTML=data.map(c=>`<tr>
    <td class="ed" data-id="${c.id}" data-field="name" onclick="activateTextCell(this,'${c.id}','name')">
      <div class="cw"><span class="ct${!c.name?' cm':''}">${c.name||'—'}</span></div></td>
    <td class="ed" data-id="${c.id}" data-field="courthouse" onclick="activateTextCell(this,'${c.id}','courthouse')">
      <div class="cw"><span class="ct${!c.courthouse?' cm':''}">${c.courthouse||'—'}</span></div></td>
    <td class="badge-cell" onclick="openStatusPopup(event,'${c.id}')">
      <div class="cw">${badge(c.status)}</div></td>
    <td class="person-cell" onclick="openPersonPopup(event,'${c.id}')">
      <div class="cw">${renderPersonChips(c)}</div></td>
    <td class="date-cell ed" onclick="openCalendar(event,'${c.id}','court')">
      <div class="cw"><span class="${dlCls(c.court)}">${fmtDate(c.court)||'<span class="cm">—</span>'}</span></div></td>
    <td class="date-cell ed" onclick="openCalendar(event,'${c.id}','deadline')">
      <div class="cw"><span class="${dlCls(c.deadline)}">${fmtDate(c.deadline)||'<span class="cm">—</span>'}</span></div></td>
    <td class="ed" data-id="${c.id}" data-field="desc" onclick="activateTextCell(this,'${c.id}','desc')">
      <div class="cw"><span class="ct${!c.desc?' cm':''}" style="white-space:pre-wrap;line-height:1.5;word-break:break-word">${c.desc?c.desc.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'—'}</span></div></td>
    <td class="ed" data-id="${c.id}" data-field="caseNum" onclick="activateTextCell(this,'${c.id}','caseNum')">
      <div class="cw"><span class="ct${!c.caseNum?' cm':''}">${c.caseNum||'—'}</span></div></td>
    <td class="ed" data-id="${c.id}" data-field="courtStock" onclick="activateTextCell(this,'${c.id}','courtStock')">
      <div class="cw"><span class="ct${!c.courtStock?' cm':''}">${c.courtStock||'—'}</span></div></td>
    <td data-id="${c.id}" data-field="phone" onclick="handlePhoneCell(event,'${c.id}')">
      <div class="cw">${c.phone?`<a href="tel:${c.phone.replace(/[^0-9+]/g,'')}" onclick="event.stopPropagation()" style="color:#7DC3F7;text-decoration:none;display:flex;align-items:center;gap:4px;white-space:nowrap"><i class="ti ti-phone" style="font-size:12px;flex-shrink:0"></i>${c.phone}</a>`:'<span class="cm">—</span>'}</div></td>
    <td class="ed" data-id="${c.id}" data-field="ext" onclick="activateTextCell(this,'${c.id}','ext')">
      <div class="cw"><span class="ct${!c.ext?' cm':''}">${c.ext||'—'}</span></div></td>
    <td style="text-align:center">
      <button class="del-btn" onclick="deleteRow('${c.id}')" title="刪除"><i class="ti ti-trash"></i></button></td>
  </tr>`).join('');
}

// ── Phone cell: single click = call, double click = edit ──
function handlePhoneCell(e, caseId){
  // if clicking the <a> tag itself, let it go through
  if(e.target.tagName==='A'||e.target.closest('a')) return;
  activateTextCell(e.currentTarget, caseId, 'phone');
}

// ── Person helpers ──
function renderPersonChips(c){
  const ids=c.personIds||(c.personId?[c.personId]:[]);
  if(!ids.length) return '<span class="cm">—</span>';
  return ids.map(id=>{
    const m=members.find(x=>x.id===id);
    return m?`<span class="pchip" style="margin:1px 2px">${m.name}</span>`:'';
  }).filter(Boolean).join('');
}

function renderPersonCheckboxes(selectedIds){
  const box=document.getElementById('personCheckboxes');
  if(!members.length){box.innerHTML='<div style="font-size:12px;color:var(--tm)">尚無人員</div>';return;}
  box.innerHTML=members.map(m=>`
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--t1)">
      <input type="checkbox" class="person-cb" data-id="${m.id}" ${selectedIds.includes(m.id)?'checked':''} style="accent-color:var(--gold);width:14px;height:14px">
      ${m.name}
    </label>
  `).join('');
}

// ── Person popup (inline) ──
let personPopupCaseId=null;
function openPersonPopup(e, caseId){
  e.stopPropagation();
  commitActiveCell();
  personPopupCaseId=caseId;
  const c=cases.find(x=>x.id===caseId);
  const selectedIds=c.personIds||(c.personId?[c.personId]:[]);
  const list=document.getElementById('personPopupList');
  if(!members.length){
    list.innerHTML='<div style="font-size:12px;color:var(--tm);padding:6px 12px">尚無人員，請先新增</div>';
  } else {
    list.innerHTML=members.map(m=>`
      <div class="sp-item" onclick="togglePersonAssign('${m.id}')" id="pp_${m.id}">
        <div style="width:16px;height:16px;border-radius:4px;border:1.5px solid var(--bd-b);display:flex;align-items:center;justify-content:center;flex-shrink:0;${selectedIds.includes(m.id)?'background:var(--gold);border-color:var(--gold)':''}">
          ${selectedIds.includes(m.id)?'<i class="ti ti-check" style="font-size:11px;color:var(--navy)"></i>':''}
        </div>
        <span>${m.name}</span>
      </div>
    `).join('');
  }
  const pop=document.getElementById('personPopup');
  pop.style.display='block';
  const rect=e.currentTarget.getBoundingClientRect();
  let left=rect.left, top=rect.bottom+4;
  if(left+200>window.innerWidth) left=window.innerWidth-204;
  if(top+220>window.innerHeight) top=rect.top-220;
  pop.style.left=left+'px'; pop.style.top=top+'px';
}
function togglePersonAssign(memberId){
  if(!personPopupCaseId) return;
  const c=cases.find(x=>x.id===personPopupCaseId);
  if(!c) return;
  if(!c.personIds) c.personIds=c.personId?[c.personId]:[];
  const idx=c.personIds.indexOf(memberId);
  if(idx>=0) c.personIds.splice(idx,1);
  else c.personIds.push(memberId);
  var pCase=cases.find(function(x){return x.id===personPopupCaseId;});
  if(pCase) dbSaveCase(pCase);
  // re-render popup checkboxes
  openPersonPopup({stopPropagation:()=>{},currentTarget:document.getElementById('personPopup')}, personPopupCaseId);
  renderSidebar(); renderCases();
}

// close person popup on outside click
document.addEventListener('click', e=>{
  if(!e.target.closest('#personPopup')&&!e.target.closest('.person-cell')){
    document.getElementById('personPopup').style.display='none';
    personPopupCaseId=null;
  }
}, true);

// ── Case Modal ──
function closeCaseModal(){ document.getElementById('caseModal').classList.remove('show'); }
function saveCaseModal(){
  var name=document.getElementById('cName').value.trim();
  if(!name){alert('請填寫案件名稱');return;}
  var selectedIds=Array.from(document.querySelectorAll('.person-cb:checked')).map(function(el){return el.dataset.id;});
  var obj={
    name:name,
    status:document.getElementById('cStatus').value,
    court:document.getElementById('cCourt').value||null,
    deadline:document.getElementById('cDeadline').value||null,
    courthouse:document.getElementById('cCourthouse').value||'',
    caseNum:document.getElementById('cCaseNum').value||'',
    courtStock:document.getElementById('cCourtStock').value||'',
    phone:document.getElementById('cPhone').value||'',
    ext:document.getElementById('cExt').value||'',
    desc:document.getElementById('cDesc').value||'',
    personIds:selectedIds
  };
  closeCaseModal();
  if(editingCaseId){
    var idx=cases.findIndex(function(x){return x.id===editingCaseId;});
    if(idx>=0){
      var updated=Object.assign({}, cases[idx], obj);
      dbSaveCase(updated);
    }
  } else {
    var newCase=Object.assign({id:'tmp_'+uid()}, obj);
    dbSaveCase(newCase);
  }
}
function deleteCaseFromModal(){
  if(!editingCaseId||!confirm('確定刪除此案件？')) return;
  var delId=editingCaseId;
  closeCaseModal();
  dbDeleteCase(delId);
}


// ── Drag to reorder members ──
let dragSrcId=null;
function dragStart(e, id){
  dragSrcId=id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function dragDrop(e, targetId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(dragSrcId===targetId) return;
  const srcIdx=members.findIndex(m=>m.id===dragSrcId);
  const tgtIdx=members.findIndex(m=>m.id===targetId);
  if(srcIdx<0||tgtIdx<0) return;
  const [moved]=members.splice(srcIdx,1);
  members.splice(tgtIdx,0,moved);
  members.forEach(function(m,i){ m.sort_order=i; dbSaveMember(m); });
  renderSidebar();
}
function dragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.tn-member').forEach(el=>el.classList.remove('drag-over','dragging'));
  dragSrcId=null;
}
</script>

<!-- Case Modal -->
<div class="overlay" id="caseModal">
  <div class="modal" style="width:460px">
    <div class="mhead">
      <span class="mtitle" id="caseModalTitle">新增案件</span>
      <button class="mclose" onclick="closeCaseModal()">×</button>
    </div>
    <div class="mbody">
      <div class="fg"><label class="flabel">案件名稱</label><input class="finput" id="cName"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="fg"><label class="flabel">狀態</label>
          <select class="fselect" id="cStatus">
            <option value="urgent">優先處理</option>
            <option value="progress">處理中</option>
            <option value="done">已完成</option>
          </select>
        </div>
        <div class="fg"><label class="flabel">負責人（可複選）</label>
          <div id="personCheckboxes" style="background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px;display:flex;flex-direction:column;gap:6px;max-height:120px;overflow-y:auto;"></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="fg">
          <label class="flabel">開庭日</label>
          <div class="date-trigger" id="cCourtDisplay" onclick="openModalCalendar(event,'court')" style="background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);padding:8px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;color:var(--t1);">
            <span id="cCourtLabel" style="color:var(--tm)">未選擇</span>
            <i class="ti ti-calendar" style="font-size:14px;color:var(--tm)"></i>
          </div>
          <input type="hidden" id="cCourt">
        </div>
        <div class="fg">
          <label class="flabel">工作截止日</label>
          <div class="date-trigger" id="cDeadlineDisplay" onclick="openModalCalendar(event,'deadline')" style="background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);padding:8px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;color:var(--t1);">
            <span id="cDeadlineLabel" style="color:var(--tm)">未選擇</span>
            <i class="ti ti-calendar" style="font-size:14px;color:var(--tm)"></i>
          </div>
          <input type="hidden" id="cDeadline">
        </div>
      </div>
      <div class="fg"><label class="flabel">法院／檢察署</label><input class="finput" id="cCourthouse"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="fg"><label class="flabel">案號</label><input class="finput" id="cCaseNum"></div>
        <div class="fg"><label class="flabel">股別</label><input class="finput" id="cCourtStock"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="fg"><label class="flabel">電話</label><input class="finput" id="cPhone"></div>
        <div class="fg"><label class="flabel">分機</label><input class="finput" id="cExt"></div>
      </div>
      <div class="fg"><label class="flabel">進行概述</label><textarea class="finput" id="cDesc" style="resize:vertical;min-height:64px;line-height:1.5"></textarea></div>
    </div>
    <div class="mfoot">
      <button class="btn bda" id="delCaseBtn" style="display:none;margin-right:auto" onclick="deleteCaseFromModal()"><i class="ti ti-trash"></i> 刪除</button>
      <button class="btn bg" onclick="closeCaseModal()">取消</button>
      <button class="btn bp2" onclick="saveCaseModal()">儲存</button>
    </div>
  </div>
</div>

<!-- Person popup (inline assign) -->
<div id="personPopup" class="status-popup" style="display:none;min-width:180px;">
  <div style="font-size:10px;color:var(--tm);padding:4px 8px 6px;text-transform:uppercase;letter-spacing:.8px">指派負責人</div>
  <div id="personPopupList"></div>
</div>

</body>
</html>
